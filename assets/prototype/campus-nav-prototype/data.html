<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园最短路径导航系统 - 数据管理</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="blue">
  <div class="drawer-mask" data-drawer-mask></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="logo" aria-label="校园导航 Logo"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><line x1="12" y1="9.5" x2="6" y2="4"/><line x1="12" y1="9.5" x2="18" y2="4"/><line x1="12" y1="14.5" x2="6" y2="20"/><line x1="12" y1="14.5" x2="18" y2="20"/><circle cx="6" cy="4" r="1.4" fill="currentColor"/><circle cx="18" cy="4" r="1.4" fill="currentColor"/><circle cx="6" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg></div><div><div class="brand-title">校园导航系统</div><div class="brand-subtitle">Shortest Path Navigator</div></div></div>
      <div class="nav-section-title">功能菜单</div>
      <nav class="nav-list" data-nav></nav>
      <div class="sidebar-card"><strong>数据管理</strong><p>查看 9 个地点与 15 条路径边的图结构数据；运行 C 程序后可刷新 routes.json。</p></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobile-menu-btn" data-menu-toggle>☰</button>
        <div><div class="page-kicker">Data</div><h1 class="page-title">数据管理</h1></div>
        <div class="top-actions">
          <div class="theme-switch"><button class="theme-btn" data-theme-btn="blue">蓝白</button><button class="theme-btn" data-theme-btn="dark">深色</button></div>
          <div class="user-pill"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> 图数据</div>
        </div>
      </header>

      <section class="content">
        <div class="card pad">
          <nav class="tabs">
            <button class="tab-btn active" data-tab="places">地点 (9)</button>
            <button class="tab-btn" data-tab="edges">边 (15)</button>
          </nav>

          <div class="panel active" data-panel="places">
            <div class="section-head">
              <div>
                <h2>校园地点</h2>
                <p>图结构中的 9 个顶点。</p>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>#</th><th>地点</th><th>类型</th><th>坐标</th></tr></thead>
                <tbody data-location-table></tbody>
              </table>
            </div>
          </div>

          <div class="panel" data-panel="edges">
            <div class="section-head">
              <div>
                <h2>路径边</h2>
                <p>15 条双向路径边，长度作为权值。</p>
              </div>
              <span class="badge success">双向图</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>#</th><th>起点</th><th>终点</th><th>距离</th><th>状态</th></tr></thead>
                <tbody data-path-table></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="card pad" style="margin-top:10px">
          <div class="section-head">
            <div>
              <h2>校园地图</h2>
              <p>9 个地点与 15 条边的空间分布。</p>
            </div>
          </div>
          <div class="card map-card" data-campus-map></div>
        </div>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
