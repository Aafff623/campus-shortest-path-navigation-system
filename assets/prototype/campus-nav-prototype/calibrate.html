<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园最短路径导航系统 - 坐标标定</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .calibrate-frame {
      width: 100%;
      height: calc(100vh - 72px);
      border: 0;
      display: block;
      background: var(--surface);
    }
    @media (max-width: 880px) {
      .calibrate-frame { height: calc(100vh - 64px); }
    }
  </style>
</head>
<body data-theme="blue">
  <div class="drawer-mask" data-drawer-mask></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="logo" aria-label="校园导航 Logo"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><line x1="12" y1="9.5" x2="6" y2="4"/><line x1="12" y1="9.5" x2="18" y2="4"/><line x1="12" y1="14.5" x2="6" y2="20"/><line x1="12" y1="14.5" x2="18" y2="20"/><circle cx="6" cy="4" r="1.4" fill="currentColor"/><circle cx="18" cy="4" r="1.4" fill="currentColor"/><circle cx="6" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg></div><div><div class="brand-title">校园导航系统</div><div class="brand-subtitle">Shortest Path Navigator</div></div></div>
      <div class="nav-section-title">功能菜单</div>
      <nav class="nav-list" data-nav></nav>
      <div class="sidebar-card" style="padding:10px 12px"><p style="font-size:12px;color:var(--muted);margin:0">在官方校园图上点击建筑中心获取坐标。工具内置近似比例尺 1:20000（图上 1cm ≈ 200m），可点击两点估算实际距离，仅作 Demo 参考。</p></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobile-menu-btn" data-menu-toggle>☰</button>
        <div><div class="page-kicker">坐标标定</div><h1 class="page-title">地图坐标标定</h1></div>
        <div class="top-actions">
          <div class="theme-switch"><button class="theme-btn" data-theme-btn="blue">亮色</button><button class="theme-btn" data-theme-btn="dark">深色</button></div>
          <div class="user-pill"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg> 工具</div>
        </div>
      </header>

      <iframe class="calibrate-frame" src="tools/coordinate-debug-tool.html" title="坐标标定工具" onload="this.contentWindow.postMessage({type:'set-theme',theme:document.body.dataset.theme||'blue'},'*')"></iframe>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
