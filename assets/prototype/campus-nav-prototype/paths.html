<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园最短路径导航系统 - 路径管理</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="blue">
  <div class="drawer-mask" data-drawer-mask></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="logo">⌁</div><div><div class="brand-title">校园导航系统</div><div class="brand-subtitle">Shortest Path Navigator</div></div></div>
      <div class="nav-section-title">功能菜单</div>
      <nav class="nav-list" data-nav></nav>
      <div class="sidebar-card"><strong>路径管理</strong><p>用于维护图结构中的边和权值，权值表示路径长度。</p></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobile-menu-btn" data-menu-toggle>☰</button>
        <div><div class="page-kicker">Path Management</div><h1 class="page-title">路径管理</h1></div>
        <div class="top-actions">
          <div class="theme-switch"><button class="theme-btn" data-theme-btn="blue">蓝白</button><button class="theme-btn" data-theme-btn="green">浅绿</button><button class="theme-btn" data-theme-btn="dark">深色</button></div>
          <div class="user-pill"><span class="avatar">⛓</span> 路径数据</div>
        </div>
      </header>

      <section class="content">
        <section class="card pad">
          <div class="section-head">
            <div><h2>新增路径</h2><p>选择两个地点并填写距离，形成图结构中的一条边。</p></div>
          </div>
          <div class="search-panel">
            <div class="input-wrap"><span class="input-icon">A</span><select data-place-select name="start"></select></div>
            <div class="input-wrap"><span class="input-icon">B</span><select data-place-select name="end" data-default="library"></select></div>
            <div class="input-wrap"><span class="input-icon">m</span><input placeholder="路径长度，如 220" /></div>
          </div>
          <div class="form-actions"><button class="btn secondary" data-demo-submit="#path-demo-alert">保存路径</button></div>
          <div class="alert" id="path-demo-alert"></div>
        </section>

        <div class="grid two" style="margin-top:20px">
          <section class="card pad">
            <div class="section-head">
              <div><h2>路径列表</h2><p>边数据会被 Dijkstra 算法读取并参与最短路径计算。</p></div>
              <span class="badge success">双向图</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>序号</th><th>起点</th><th>终点</th><th>距离</th><th>状态</th><th>操作</th></tr></thead>
                <tbody data-path-table></tbody>
              </table>
            </div>
          </section>
          <section class="card map-card" data-campus-map data-active="teaching,library,canteen,lab"></section>
        </div>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
