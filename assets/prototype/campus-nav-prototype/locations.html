<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园最短路径导航系统 - 地点管理</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="blue">
  <div class="drawer-mask" data-drawer-mask></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="logo" aria-label="校园导航 Logo"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><line x1="12" y1="9.5" x2="6" y2="4"/><line x1="12" y1="9.5" x2="18" y2="4"/><line x1="12" y1="14.5" x2="6" y2="20"/><line x1="12" y1="14.5" x2="18" y2="20"/><circle cx="6" cy="4" r="1.4" fill="currentColor"/><circle cx="18" cy="4" r="1.4" fill="currentColor"/><circle cx="6" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg></div><div><div class="brand-title">校园导航系统</div><div class="brand-subtitle">Shortest Path Navigator</div></div></div>
      <div class="nav-section-title">功能菜单</div>
      <nav class="nav-list" data-nav></nav>
      <div class="sidebar-card"><strong>地点管理</strong><p>用于录入教学楼、食堂、宿舍等图结构中的顶点。</p></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobile-menu-btn" data-menu-toggle>☰</button>
        <div><div class="page-kicker">Place Management</div><h1 class="page-title">地点管理</h1></div>
        <div class="top-actions">
          <div class="theme-switch"><button class="theme-btn" data-theme-btn="blue">蓝白</button><button class="theme-btn" data-theme-btn="dark">深色</button></div>
          <div class="user-pill"><span class="avatar">📍</span> 地点数据</div>
        </div>
      </header>

      <section class="content">
        <div class="grid two">
          <section class="card pad">
            <div class="section-head">
              <div><h2>新增地点</h2><p>静态原型中仅演示界面，真实课程设计可接入数组、文件或数据库。</p></div>
            </div>
            <div class="mock-form-grid">
              <div class="form-row"><label>地点名称</label><div class="input-wrap"><span class="input-icon">🏫</span><input placeholder="如：教学楼" /></div></div>
              <div class="form-row"><label>地点类型</label><div class="input-wrap"><span class="input-icon">▦</span><input placeholder="如：教学区域" /></div></div>
              <div class="form-row"><label>坐标 X</label><div class="input-wrap"><span class="input-icon">X</span><input placeholder="如：145" /></div></div>
              <div class="form-row"><label>坐标 Y</label><div class="input-wrap"><span class="input-icon">Y</span><input placeholder="如：95" /></div></div>
            </div>
            <div class="form-actions"><button class="btn secondary" data-demo-submit="#location-demo-alert">保存地点</button></div>
            <div class="alert" id="location-demo-alert"></div>
          </section>
          <section class="card map-card" data-campus-map></section>
        </div>

        <section class="card pad" style="margin-top:20px">
          <div class="section-head">
            <div><h2>校园地点列表</h2><p>图结构中的顶点数据，可用于后续路径查询。</p></div>
            <span class="badge">9 个地点</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>序号</th><th>地点名称</th><th>类型</th><th>地图坐标</th><th>操作</th></tr></thead>
              <tbody data-location-table></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
