<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园最短路径导航系统 - 路径查询</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="blue">
  <div class="drawer-mask" data-drawer-mask></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="logo" aria-label="校园导航 Logo"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><line x1="12" y1="9.5" x2="6" y2="4"/><line x1="12" y1="9.5" x2="18" y2="4"/><line x1="12" y1="14.5" x2="6" y2="20"/><line x1="12" y1="14.5" x2="18" y2="20"/><circle cx="6" cy="4" r="1.4" fill="currentColor"/><circle cx="18" cy="4" r="1.4" fill="currentColor"/><circle cx="6" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg></div><div><div class="brand-title">校园导航系统</div><div class="brand-subtitle">Shortest Path Navigator</div></div></div>
      <div class="nav-section-title">功能菜单</div>
      <nav class="nav-list" data-nav></nav>
      <div class="sidebar-card"><strong>查询提示</strong><p>选择不同起点和终点后，系统会跳转到结果页展示最短路线。</p></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobile-menu-btn" data-menu-toggle>☰</button>
        <div><div class="page-kicker">Path Query</div><h1 class="page-title">路径查询</h1></div>
        <div class="top-actions">
          <div class="theme-switch"><button class="theme-btn" data-theme-btn="blue">蓝白</button><button class="theme-btn" data-theme-btn="dark">深色</button></div>
          <div class="user-pill"><span class="avatar">🧭</span> 导航查询</div>
        </div>
      </header>

      <section class="content">
        <div class="grid two">
          <section class="card pad">
            <div class="section-head">
              <div>
                <h2>选择起点与终点</h2>
                <p>静态原型已内置校园地点和路径数据，可直接体验查询流程。</p>
              </div>
            </div>
            <form class="form" data-query-form>
              <div class="form-row">
                <label for="start">起点</label>
                <div class="input-wrap"><span class="input-icon">📍</span><select id="start" name="start" data-place-select></select></div>
              </div>
              <div class="form-row">
                <label for="end">终点</label>
                <div class="input-wrap"><span class="input-icon">🏁</span><select id="end" name="end" data-place-select data-default="library"></select></div>
              </div>
              <div class="alert" data-query-error></div>
              <button class="btn primary" type="submit">查询最短路径</button>
              <a class="btn ghost" href="result.html?start=teaching&end=library">查看示例结果</a>
            </form>
          </section>

          <section class="card map-card" data-campus-map data-active="teaching,playground,library"></section>
        </div>

        <div class="card pad" style="margin-top:10px">
          <div class="section-head">
            <div>
              <h2>异常输入处理</h2>
              <p>原型中通过表单校验处理未选择地点、起终点相同、无可达路径等情况。</p>
            </div>
          </div>
          <div class="grid three">
            <div class="stat-card card"><div class="icon">⚠</div><strong>未选择</strong><span>提示用户补全起点或终点。</span></div>
            <div class="stat-card card"><div class="icon">↔</div><strong>相同地点</strong><span>起点和终点相同时阻止查询。</span></div>
            <div class="stat-card card"><div class="icon">∅</div><strong>不可达</strong><span>图中不存在路径时展示错误提示。</span></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
