<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园最短路径导航系统 - 路径查询</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="blue">
  <div class="drawer-mask" data-drawer-mask></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="logo" aria-label="校园导航 Logo"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><line x1="12" y1="9.5" x2="6" y2="4"/><line x1="12" y1="9.5" x2="18" y2="4"/><line x1="12" y1="14.5" x2="6" y2="20"/><line x1="12" y1="14.5" x2="18" y2="20"/><circle cx="6" cy="4" r="1.4" fill="currentColor"/><circle cx="18" cy="4" r="1.4" fill="currentColor"/><circle cx="6" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg></div><div><div class="brand-title">校园导航系统</div><div class="brand-subtitle">Shortest Path Navigator</div></div></div>
      <div class="nav-section-title">功能菜单</div>
      <nav class="nav-list" data-nav></nav>
      <div class="sidebar-card"><strong>查询提示</strong><p>选择起终点后点击查询，结果会直接出现在本页下方。</p></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobile-menu-btn" data-menu-toggle>☰</button>
        <div><div class="page-kicker">Path Query</div><h1 class="page-title">路径查询</h1></div>
        <div class="top-actions">
          <div class="theme-switch"><button class="theme-btn" data-theme-btn="blue">蓝白</button><button class="theme-btn" data-theme-btn="dark">深色</button></div>
          <div class="user-pill"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><line x1="12" y1="9.5" x2="6" y2="4"/><line x1="12" y1="9.5" x2="18" y2="4"/><line x1="12" y1="14.5" x2="6" y2="20"/><line x1="12" y1="14.5" x2="18" y2="20"/><circle cx="6" cy="4" r="1.4" fill="currentColor"/><circle cx="18" cy="4" r="1.4" fill="currentColor"/><circle cx="6" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg> 导航查询</div>
        </div>
      </header>

      <section class="content">
        <!-- section 1: 输入 -->
        <section class="card pad query-section">
          <div class="section-head">
            <div>
              <h2>选择起点与终点</h2>
              <p>选择起终点后点击查询，结果会在下方展示。</p>
            </div>
          </div>
          <div class="grid two">
            <form class="form form-compact query-form" data-query-form>
              <div class="route-bar">
                <div class="route-rail" aria-hidden="true">
                  <span class="route-rail-dot is-start"></span>
                  <span class="route-rail-line"></span>
                  <span class="route-rail-dot is-end"></span>
                </div>
                <div class="route-fields">
                  <div class="route-field">
                    <label class="route-field-label" for="start">起点</label>
                    <div class="input-wrap input-wrap-compact input-wrap-inset">
                      <select id="start" name="start" data-place-select></select>
                    </div>
                  </div>
                  <div class="route-field">
                    <label class="route-field-label" for="end">终点</label>
                    <div class="input-wrap input-wrap-compact input-wrap-inset">
                      <select id="end" name="end" data-place-select data-default="library"></select>
                    </div>
                  </div>
                </div>
              </div>
              <div class="alert" data-query-error></div>
              <div class="query-form-actions">
                <button class="btn primary" type="submit">查询最短路径</button>
              </div>
            </form>
            <div class="card map-card is-compact" data-campus-map></div>
          </div>
        </section>

        <!-- section 2: 异常说明 -->
        <section class="card pad query-section">
          <div class="section-head">
            <div>
              <h2>异常输入处理</h2>
              <p>未选择 / 相同地点 / 不可达 都会给出提示。</p>
            </div>
          </div>
          <div class="grid three">
            <div class="stat-card card">
              <div class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0z"/></svg></div>
              <strong>未选择</strong>
              <span>提示补全起点或终点。</span>
            </div>
            <div class="stat-card card">
              <div class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 5l-7 7 7 7"/></svg></div>
              <strong>相同地点</strong>
              <span>起终点相同时阻止查询。</span>
            </div>
            <div class="stat-card card">
              <div class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg></div>
              <strong>不可达</strong>
              <span>图中不存在路径时提示。</span>
            </div>
          </div>
        </section>

        <!-- section 3: 结果（默认 empty） -->
        <section class="query-section" data-result-root>
          <div class="card pad empty-state">
            <div class="big-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19l4-4 4 2 6-8"/></svg>
            </div>
            <h2>选择起终点后查询</h2>
            <p>结果会出现在此处，包括最短距离、路径文字序列和地图高亮。</p>
          </div>
        </section>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
